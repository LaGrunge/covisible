name: Publish to PyPI

# Build and publish whenever a version tag is pushed, e.g.:
#   git tag v0.1.1 && git push origin v0.1.1
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build backend
        run: python -m pip install --upgrade build

      - name: Build sdist and wheel
        run: python -m build

      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Verify tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg=$(python -c "import tomllib,glob,re; \
            print(re.search(r'__version__\s*=\s*\"([^\"]+)\"', open('src/covisible/__init__.py').read()).group(1))")
          echo "tag=$tag package=$pkg"
          test "$tag" = "$pkg" || { echo "::error::tag v$tag != __version__ $pkg"; exit 1; }

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/covisible
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
