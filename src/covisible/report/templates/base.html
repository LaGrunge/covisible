<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="icon" type="image/svg+xml" href="{% if file_path %}../{% endif %}assets/favicon.svg">
    <link rel="stylesheet" href="{% if file_path %}../{% endif %}assets/css/style.css">
    <script src="{% if file_path %}../{% endif %}assets/js/app.js" defer></script>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="{% if file_path %}../{% endif %}index.html" class="logo">
                <img src="{% if file_path %}../{% endif %}assets/logo.png" alt="Covisible" class="logo-img">
                <span class="logo-text">Covisible</span>
            </a>
            <nav class="nav">
                <button id="theme-toggle" class="btn btn-icon" title="Toggle theme (T)">
                    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </nav>
        </div>
    </header>

    <main class="main">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>Generated by <a href="https://github.com/LaGrunge/covisible">Covisible</a></p>
    </footer>
</body>
</html>
