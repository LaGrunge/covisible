<!-- Sunburst Chart Component -->
<section class="sunburst-section">
    <div class="sunburst-breadcrumb" id="sunburst-breadcrumb"></div>
    <div class="sunburst-center-wrapper">
        <div class="sunburst-chart-fixed" id="sunburst-chart"></div>
    </div>
    <div class="sunburst-info-bar" id="sunburst-info">
        <div class="sunburst-info-path">Hover over segments</div>
        <div class="sunburst-info-details">
            <span class="sunburst-info-pct"></span>
            <span class="sunburst-info-lines"></span>
            <span class="sunburst-info-hint"></span>
        </div>
    </div>
</section>

<script>
(function() {
    const sunburstData = {{ treemap_data | tojson }};
    let sunburstRendered = false;
    
    // Gradient color based on coverage percentage (0% = red, 100% = green)
    function getCoverageColor(pct, alpha = 0.85) {
        // Clamp percentage to 0-100
        const p = Math.max(0, Math.min(100, pct)) / 100;
        // Interpolate from red (0, 100, 60) to green (120, 100, 45) in HSL
        // Red: hsl(0, 100%, 60%) -> Green: hsl(120, 100%, 40%)
        const hue = p * 120; // 0 (red) to 120 (green)
        const saturation = 75 + p * 10; // 75% to 85%
        const lightness = 50 - p * 10; // 50% to 40% (darker green for better contrast)
        return `hsla(${hue}, ${saturation}%, ${lightness}%, ${alpha})`;
    }
    
    function renderSunburst(data, containerId) {
        const container = document.getElementById(containerId);
        if (!container || !data || !data.children || !data.children.length) {
            if (container) container.innerHTML = '<p class="no-data">No data</p>';
            return;
        }
        
        container.innerHTML = '';
        
        const size = 650;
        const radius = size / 2;
        const innerR = radius * 0.18;
        const ringWidth = (radius - innerR) / 5;
        
        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.setAttribute('width', size);
        svg.setAttribute('height', size);
        svg.setAttribute('viewBox', `0 0 ${size} ${size}`);
        svg.style.display = 'block';
        svg.style.margin = '0 auto';
        container.appendChild(svg);
        
        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        g.setAttribute('transform', `translate(${radius}, ${radius})`);
        svg.appendChild(g);
        
        // State
        let currentRoot = data;
        let zoomStack = [data];
        let pathElements = new Map(); // Store path elements for animation
        const animDuration = 400; // Animation duration in ms
        const padAngle = 0.008;
        const padRadius = 3;
        
        // Build path index for history navigation
        const nodeIndex = new Map();
        function indexNodes(node, path = '') {
            const nodePath = path ? path : 'root';
            nodeIndex.set(nodePath, node);
            if (node.children) {
                node.children.forEach(child => {
                    indexNodes(child, child.path || child.name);
                });
            }
        }
        indexNodes(data);
        
        // Navigate to a specific path (for history)
        function navigateToPath(pathStr, animate = false) {
            if (!pathStr || pathStr === 'root') {
                const prevNodes = animate ? collectNodes(currentRoot) : null;
                zoomStack = [data];
                currentRoot = data;
                render(currentRoot, animate, prevNodes);
                updateBreadcrumb();
                return;
            }
            
            // Build zoom stack by traversing path
            const parts = pathStr.split('/');
            let node = data;
            const newStack = [data];
            
            for (let i = 0; i < parts.length; i++) {
                const partPath = parts.slice(0, i + 1).join('/');
                const found = node.children?.find(c => (c.path || c.name) === partPath);
                if (found) {
                    newStack.push(found);
                    node = found;
                } else {
                    break;
                }
            }
            
            if (newStack.length > 1) {
                const prevNodes = animate ? collectNodes(currentRoot) : null;
                zoomStack = newStack;
                currentRoot = newStack[newStack.length - 1];
                render(currentRoot, animate, prevNodes);
                updateBreadcrumb();
            }
        }
        
        // History (back/forward) is owned by the modules controller via the
        // URL hash; the sunburst just follows navigateToPath().

        // Collect nodes for a given root
        function collectNodes(rootNode) {
            const nodes = [];
            function collect(node, depth, a0, a1) {
                if (depth > 4) return;
                nodes.push({ node, depth, a0, a1 });
                
                if (node.children && node.children.length) {
                    const total = node.children.reduce((s, c) => s + (c.total_lines || 1), 0);
                    let angle = a0;
                    node.children.forEach(child => {
                        const extent = ((child.total_lines || 1) / total) * (a1 - a0);
                        if (extent > 0.005) {
                            collect(child, depth + 1, angle, angle + extent);
                        }
                        angle += extent;
                    });
                }
            }
            collect(rootNode, 0, 0, Math.PI * 2);
            return nodes;
        }
        
        // Interpolate between two values
        function lerp(a, b, t) { return a + (b - a) * t; }
        
        // Animate transition between states
        function animateTransition(fromNodes, toNodes, onComplete) {
            const startTime = performance.now();
            
            // Build lookup maps
            const fromMap = new Map();
            fromNodes.forEach(n => fromMap.set(n.node.path || n.node.name, n));
            const toMap = new Map();
            toNodes.forEach(n => toMap.set(n.node.path || n.node.name, n));
            
            function animate(currentTime) {
                const elapsed = currentTime - startTime;
                const t = Math.min(elapsed / animDuration, 1);
                const easeT = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; // easeInOutQuad
                
                pathElements.forEach((path, key) => {
                    const from = fromMap.get(key);
                    const to = toMap.get(key);
                    
                    if (from && to) {
                        // Interpolate position
                        const a0 = lerp(from.a0, to.a0, easeT);
                        const a1 = lerp(from.a1, to.a1, easeT);
                        const depth = lerp(from.depth, to.depth, easeT);
                        
                        const inner = innerR + (depth - 1) * ringWidth + padRadius;
                        const outer = innerR + depth * ringWidth - padRadius;
                        
                        const arcSpan = a1 - a0;
                        const paddedA0 = a0 + (arcSpan > padAngle * 2 ? padAngle : 0);
                        const paddedA1 = a1 - (arcSpan > padAngle * 2 ? padAngle : 0);
                        
                        if (paddedA1 > paddedA0 && inner > 0 && outer > inner) {
                            path.setAttribute('d', arcPath(inner, outer, paddedA0, paddedA1));
                            path.style.opacity = '1';
                        } else {
                            path.style.opacity = '0';
                        }
                    } else if (to && !from) {
                        // Fade in new elements
                        path.style.opacity = easeT.toString();
                    } else if (from && !to) {
                        // Fade out removed elements
                        path.style.opacity = (1 - easeT).toString();
                    }
                });
                
                if (t < 1) {
                    requestAnimationFrame(animate);
                } else {
                    if (onComplete) onComplete();
                }
            }
            
            requestAnimationFrame(animate);
        }
        
        // Delegate navigation to the page controller so the modules table and
        // the sunburst stay in sync; fall back to local zoom if used standalone.
        function emitNavigate(pathStr) {
            if (window.onSunburstNavigate) window.onSunburstNavigate(pathStr);
            else navigateToPath(pathStr, true);
        }

        function handleNodeClick(node, e) {
            e.stopPropagation();
            if (node.is_file && node.full_path) {
                const filePath = node.full_path.replace(/\//g, '_').replace(/\\/g, '_');
                window.location.href = 'files/' + filePath + '.html';
            } else if (node.children && node.children.length) {
                emitNavigate(node.path || node.name);
            }
        }

        function render(rootNode, animate = false, prevNodes = null) {
            const nodes = collectNodes(rootNode);
            
            if (!animate || !prevNodes) {
                // Initial render or no animation
                g.innerHTML = '';
                pathElements.clear();
                
                nodes.slice(1).forEach(({ node, depth, a0, a1 }) => {
                    const inner = innerR + (depth - 1) * ringWidth + padRadius;
                    const outer = innerR + depth * ringWidth - padRadius;
                    
                    const arcSpan = a1 - a0;
                    const paddedA0 = a0 + (arcSpan > padAngle * 2 ? padAngle : 0);
                    const paddedA1 = a1 - (arcSpan > padAngle * 2 ? padAngle : 0);
                    
                    if (paddedA1 <= paddedA0) return;
                    
                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    path.setAttribute('d', arcPath(inner, outer, paddedA0, paddedA1));
                    path.setAttribute('fill', getCoverageColor(node.coverage_percent));
                    path.setAttribute('stroke', 'none');
                    path.style.cursor = 'pointer';
                    
                    path.addEventListener('mouseenter', () => {
                        path.setAttribute('fill', getCoverageColor(node.coverage_percent, 1));
                        showInfo(node);
                    });
                    
                    path.addEventListener('mouseleave', () => {
                        path.setAttribute('fill', getCoverageColor(node.coverage_percent));
                        hideInfo();
                    });
                    
                    path.addEventListener('click', (e) => handleNodeClick(node, e));
                    
                    pathElements.set(node.path || node.name, path);
                    g.appendChild(path);
                });
            } else {
                // Animated transition
                // Create ALL paths for the new state that don't exist yet
                // For zoom out, we need to add paths that weren't visible before
                nodes.slice(1).forEach(({ node, depth, a0, a1 }) => {
                    const key = node.path || node.name;
                    if (!pathElements.has(key)) {
                        // Calculate initial position (collapsed to center for zoom out)
                        const inner = innerR + (depth - 1) * ringWidth + padRadius;
                        const outer = innerR + depth * ringWidth - padRadius;
                        const arcSpan = a1 - a0;
                        const paddedA0 = a0 + (arcSpan > padAngle * 2 ? padAngle : 0);
                        const paddedA1 = a1 - (arcSpan > padAngle * 2 ? padAngle : 0);
                        
                        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                        // Start with the target position but invisible
                        if (paddedA1 > paddedA0) {
                            path.setAttribute('d', arcPath(inner, outer, paddedA0, paddedA1));
                        }
                        path.setAttribute('fill', getCoverageColor(node.coverage_percent));
                        path.setAttribute('stroke', 'none');
                        path.style.cursor = 'pointer';
                        path.style.opacity = '0';
                        
                        path.addEventListener('mouseenter', () => {
                            path.setAttribute('fill', getCoverageColor(node.coverage_percent, 1));
                            showInfo(node);
                        });
                        
                        path.addEventListener('mouseleave', () => {
                            path.setAttribute('fill', getCoverageColor(node.coverage_percent));
                            hideInfo();
                        });
                        
                        path.addEventListener('click', (e) => handleNodeClick(node, e));

                        pathElements.set(key, path);
                        g.insertBefore(path, g.firstChild);
                    }
                });
                
                animateTransition(prevNodes, nodes, () => {
                    // Clean up paths that are no longer visible
                    const nodeKeys = new Set(nodes.map(n => n.node.path || n.node.name));
                    pathElements.forEach((path, key) => {
                        if (!nodeKeys.has(key)) {
                            path.remove();
                            pathElements.delete(key);
                        }
                    });
                    
                    // Ensure all visible paths have opacity 1
                    nodes.slice(1).forEach(({ node }) => {
                        const key = node.path || node.name;
                        const path = pathElements.get(key);
                        if (path) path.style.opacity = '1';
                    });
                });
            }
            
            // Center group (clickable) - always recreate
            let centerG = g.querySelector('.center-group');
            if (centerG) centerG.remove();
            
            centerG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            centerG.setAttribute('class', 'center-group');
            centerG.style.cursor = zoomStack.length > 1 ? 'pointer' : 'default';
            
            const center = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            center.setAttribute('r', innerR - 3);
            center.setAttribute('fill', getCoverageColor(rootNode.coverage_percent, 0.9));
            center.setAttribute('stroke', 'rgba(255, 255, 255, 0.3)');
            center.setAttribute('stroke-width', '2');
            centerG.appendChild(center);
            
            // Center text - just percentage
            const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            text.setAttribute('text-anchor', 'middle');
            text.setAttribute('dy', '0.35em');
            text.setAttribute('fill', '#fff');
            text.style.fontSize = '28px';
            text.style.fontWeight = '700';
            text.style.pointerEvents = 'none';
            text.textContent = rootNode.coverage_percent.toFixed(1) + '%';
            centerG.appendChild(text);
            
            // Click handler on entire center group - zoom out to parent dir
            centerG.addEventListener('click', () => {
                if (zoomStack.length > 1) {
                    const parent = zoomStack[zoomStack.length - 2];
                    emitNavigate(parent === data ? 'root' : (parent.path || parent.name));
                }
            });
            
            g.appendChild(centerG);
        }
        
        function arcPath(innerR, outerR, startAngle, endAngle) {
            const start = startAngle - Math.PI / 2;
            const end = endAngle - Math.PI / 2;
            
            const x1 = outerR * Math.cos(start);
            const y1 = outerR * Math.sin(start);
            const x2 = outerR * Math.cos(end);
            const y2 = outerR * Math.sin(end);
            const x3 = innerR * Math.cos(end);
            const y3 = innerR * Math.sin(end);
            const x4 = innerR * Math.cos(start);
            const y4 = innerR * Math.sin(start);
            
            const large = (endAngle - startAngle) > Math.PI ? 1 : 0;
            
            return `M${x1},${y1} A${outerR},${outerR} 0 ${large} 1 ${x2},${y2} L${x3},${y3} A${innerR},${innerR} 0 ${large} 0 ${x4},${y4} Z`;
        }
        
        function showInfo(node) {
            const info = document.getElementById('sunburst-info');
            if (!info) return;
            
            info.querySelector('.sunburst-info-path').textContent = node.path || node.name;
            info.querySelector('.sunburst-info-pct').innerHTML = 
                `<span style="color:${getCoverageColor(node.coverage_percent, 1)};font-size:1.5em;font-weight:700">${node.coverage_percent.toFixed(1)}%</span>`;
            info.querySelector('.sunburst-info-lines').textContent = 
                `${node.covered_lines} / ${node.total_lines} lines covered`;
            info.querySelector('.sunburst-info-hint').textContent = 
                node.is_file ? '🔗 Click to view file' : (node.children?.length ? '🔍 Click to zoom in' : '');
        }
        
        function hideInfo() {
            const info = document.getElementById('sunburst-info');
            if (!info) return;
            
            info.querySelector('.sunburst-info-path').textContent = 'Hover over segments';
            info.querySelector('.sunburst-info-pct').innerHTML = '';
            info.querySelector('.sunburst-info-lines').textContent = '';
            info.querySelector('.sunburst-info-hint').textContent = '';
        }
        
        function updateBreadcrumb() {
            const bc = document.getElementById('sunburst-breadcrumb');
            if (!bc) return;
            
            // Show <whole project> for root level
            if (zoomStack.length <= 1) {
                bc.innerHTML = '<span class="bc-current">&lt;whole project&gt;</span>';
                return;
            }
            
            // Build breadcrumb: <whole project> / dir1 / dir2 / ...
            let parts = ['<span class="bc-link" data-idx="0">&lt;whole project&gt;</span>'];
            zoomStack.slice(1).forEach((n, i) => {
                const name = n.name;
                const realIdx = i + 1;
                if (realIdx === zoomStack.length - 1) {
                    parts.push(`<span class="bc-current">${name}</span>`);
                } else {
                    parts.push(`<span class="bc-link" data-idx="${realIdx}">${name}</span>`);
                }
            });
            bc.innerHTML = parts.join(' / ');
            
            bc.querySelectorAll('.bc-link').forEach(el => {
                el.addEventListener('click', () => {
                    const idx = parseInt(el.dataset.idx);
                    const target = zoomStack[idx];
                    emitNavigate(idx === 0 ? 'root' : (target.path || target.name));
                });
            });
        }
        
        // Initial render: whole project, then let the controller pull us to
        // whatever directory the table currently shows.
        render(data);
        updateBreadcrumb();

        // Exposed so the modules controller can focus the chart on a directory.
        window.sunburstFocus = function(path, animate = true) {
            navigateToPath(path || 'root', animate);
        };
        const startPath = window.getCurrentModulePath ? window.getCurrentModulePath() : '';
        if (startPath) navigateToPath(startPath, false);
    }

    function tryRenderSunburst() {
        if (sunburstRendered) return;
        const container = document.getElementById('sunburst-chart');
        // Render eagerly even while the tab is hidden — the SVG geometry is
        // computed from data, not layout, so it's safe and makes the chart
        // ready to follow the table the moment navigateTo() fires.
        if (container && sunburstData?.children?.length) {
            renderSunburst(sunburstData, 'sunburst-chart');
            sunburstRendered = true;
        }
    }

    function setup() {
        tryRenderSunburst();
    }
    
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', setup);
    } else {
        setup();
    }
    
    window.renderSunburstChart = () => { sunburstRendered = false; tryRenderSunburst(); };
})();
</script>
